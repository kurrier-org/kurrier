version: "3.9"

services:
  web:
    image: ghcr.io/kurrier-org/kurrier-web:v3.0.10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
  worker:
    image: ghcr.io/kurrier-org/kurrier-worker:v3.0.10
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${NITRO_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
  redis:
    image: redis:8.2.2
    command: [ "redis-server", "--appendonly", "yes", "--stop-writes-on-bgsave-error","no", "--requirepass", "${REDIS_PASSWORD}" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 2s
      timeout: 1s
      retries: 30
    volumes:
      - ./redis_data:/data
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}

  dav:
    image: ckulka/baikal:nginx
    restart: always
    ports:
      - "5232:80"
    volumes:
      - ./dav_config:/var/www/baikal/config
      - ./dav_data:/var/www/baikal/Specific

  typesense:
    image: typesense/typesense:29.0
    restart: on-failure
    ports:
      - ${TYPESENSE_PORT}:${TYPESENSE_PORT}
    volumes:
      - ./typesense-data:/data
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY}
      --enable-cors
    environment:
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY}

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_BUCKET}
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - ./garage/data:/var/lib/garage/data
      - ./garage/meta:/var/lib/garage/meta
    command: >
      /garage server
      --single-node
      --default-bucket  

  baikal-postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: baikal
      POSTGRES_PASSWORD: strong_baikal_password
      POSTGRES_DB: baikal
    ports:
      - "5433:5432"
    volumes:
      - ./baikal-data:/var/lib/postgresql
      - ./baikal-init:/docker-entrypoint-initdb.d
    command: >
      postgres
      -c shared_buffers=128MB
      -c max_connections=100
      -c work_mem=4MB

  postgres:
    image: postgres:18
    container_name: app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 2s
      timeout: 2s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=200
      -c work_mem=4MB

  migrate:
    image: postgres:18
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./init:/scripts
    entrypoint: [ "/bin/bash", "/scripts/db-bootstrap.sh" ]
    restart: "no"
